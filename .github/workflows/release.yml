# Build cross-platform binaries and publish a GitHub Release when a
# `v*` tag is pushed.
#
# Runs alongside publish.yml (crates.io) — both trigger on v* tags.
# This workflow produces binaries + checksums; publish.yml handles
# crate publishing.
#
# Also runnable via `workflow_dispatch` with a `tag` input to (re)build
# and (re)publish the binaries for an EXISTING tag — used when a tag was
# pushed before this workflow could produce a release, without having to
# delete/re-create the tag (the `release-tags` ruleset restricts tag
# creation).

name: Release binaries

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Existing tag to build and release (e.g. v0.0.30)'
                required: true
                type: string

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always
    # The tag we build + release: the dispatch input when run manually,
    # otherwise the pushed tag's short name (e.g. v0.0.30).
    RELEASE_TAG: ${{ (github.event_name == 'workflow_dispatch' && inputs.tag) || github.ref_name }}

jobs:
    build:
        name: build (${{ matrix.target }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      use_cross: false
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                      use_cross: true
                    - target: x86_64-apple-darwin
                      # Intel-mac binary is CROSS-COMPILED on an Apple-Silicon
                      # runner: GitHub's Intel `macos-13` runners are effectively
                      # unavailable and this leg used to queue forever, silently
                      # skipping the whole release. macOS cross-compiles arm64 ->
                      # x86_64 natively (the toolchain step installs the target;
                      # Apple's SDK is universal), so no emulation is involved.
                      os: macos-latest
                      use_cross: false
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      use_cross: false
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                      use_cross: false
        runs-on: ${{ matrix.os }}
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v4
              with:
                  # Build the tagged commit even under workflow_dispatch (which
                  # otherwise checks out the dispatched branch).
                  ref: ${{ env.RELEASE_TAG }}

            - name: Install Linux system dependencies
              # libdbus-1-dev is required by libdbus-sys (transitive dep
              # via aether-auth's OS keyring abstraction on Linux). Only
              # needed for native Linux builds; cross uses its own
              # container; macOS / Windows don't pull libdbus-sys.
              if: matrix.os == 'ubuntu-latest' && !matrix.use_cross
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libdbus-1-dev pkg-config

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache cargo registry + build
              uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Install cross
              if: matrix.use_cross
              run: cargo install cross --git https://github.com/cross-rs/cross

            # The release bundle ships the `praxec` gateway binary.
            - name: Build (native)
              if: "!matrix.use_cross"
              run: cargo build --release -p praxec --target ${{ matrix.target }}

            - name: Build (cross)
              if: matrix.use_cross
              run: cross build --release -p praxec --target ${{ matrix.target }}

            - name: Archive (tar.gz)
              if: "!contains(matrix.target, 'windows')"
              shell: bash
              run: |
                  name="praxec-${{ matrix.target }}.tar.gz"
                  tar czf "$name" -C "target/${{ matrix.target }}/release" praxec
                  echo "ASSET=$name" >> "$GITHUB_ENV"

            - name: Archive (zip)
              if: contains(matrix.target, 'windows')
              shell: bash
              run: |
                  name="praxec-${{ matrix.target }}.zip"
                  ( cd "target/${{ matrix.target }}/release" \
                      && 7z a "$OLDPWD/$name" praxec.exe )
                  echo "ASSET=$name" >> "$GITHUB_ENV"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.target }}
                  path: ${{ env.ASSET }}
                  retention-days: 5

    release:
        name: Create GitHub Release
        needs: build
        # Run even if a build leg failed/was cancelled: publish whatever
        # binaries DID build rather than silently skipping the whole release,
        # then fail LOUD at the end if the matrix was incomplete.
        if: always()
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ env.RELEASE_TAG }}

            - name: Verify tag matches workspace version
              run: |
                  tag="${RELEASE_TAG#v}"
                  ver=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
                  if [ "$tag" != "$ver" ]; then
                    echo "::error::Tag v$tag does not match workspace version $ver"
                    exit 1
                  fi

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
              # A totally-failed build produces no artifacts; don't hard-error
              # here — the collect step below turns "zero assets" into a loud,
              # explicit failure.
              continue-on-error: true

            - name: Collect release assets
              id: collect
              run: |
                  mkdir -p release
                  find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
                      -exec mv {} release/ \; 2>/dev/null || true
                  count=$(find release -type f | wc -l | tr -d ' ')
                  echo "count=$count" >> "$GITHUB_OUTPUT"
                  if [ "$count" -eq 0 ]; then
                    echo "::error::No build artifacts were produced — every build leg failed; nothing to release."
                    exit 1
                  fi
                  cd release
                  sha256sum * > checksums.sha256
                  echo "Publishing $count platform archive(s):"
                  cat checksums.sha256

            - name: Create or update release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  # Idempotent: create the release if it doesn't exist, else
                  # upload/clobber assets onto the existing one (safe to re-run
                  # / dispatch against an already-released tag).
                  if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
                    gh release upload "$RELEASE_TAG" release/* --clobber
                  else
                    gh release create "$RELEASE_TAG" \
                      --title "$RELEASE_TAG" \
                      --generate-notes \
                      release/*
                  fi

            - name: Fail loud if the platform matrix was incomplete
              # Binaries are already published above; now surface a red run so a
              # missing platform is never mistaken for a clean release.
              if: needs.build.result != 'success'
              run: |
                  echo "::error::Release '${RELEASE_TAG}' was published but the build matrix did not fully succeed (build result: ${{ needs.build.result }}). One or more platform binaries are missing — investigate before advertising this release."
                  exit 1
