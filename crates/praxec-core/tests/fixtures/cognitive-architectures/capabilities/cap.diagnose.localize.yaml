# capabilities/cap.diagnose.localize.yaml

workflows:
  cap.diagnose.localize:
    verb: diagnose
    lifecycle: experimental
    description: >
      Pinpoint the defect to one or more file:line / symbol locations
      from parsed error + repro steps.
    snippet:
      inputs:
        parsed:      { type: object, required: true }
        repro_steps: { type: array,  required: true }
      outputs:
        defect_location: { type: object }
    skills: [diagnose.codebase.search]
    initialState: ready
    states:
      ready:
        goal: Compose codebase queries; cite findings with symbol id + file:line.
        transitions:
          submit_location:
            target: done
            actor: agent
            inputSchema:
              type: object
              required: [defect_location]
              properties:
                defect_location: { type: object }
            executor: { kind: noop }
            output:
              defect_location: "$.arguments.defect_location"
      done: { terminal: true }
