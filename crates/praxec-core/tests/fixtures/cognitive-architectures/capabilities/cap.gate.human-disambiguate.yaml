# capabilities/cap.gate.human-disambiguate.yaml
#
# Carries the E1-E3 elicitation contract: the operator picks by
# `chosen_id` (a titled single-select over the candidates), and the
# `pick` output operator re-derives the FULL candidate object into
# `chosen` — callers' `chosen: object` contract is unchanged.
# Convention: each candidate element carries `id` (stable handle)
# and `name` (display title).

workflows:
  cap.gate.human-disambiguate:
    verb: gate
    lifecycle: experimental
    description: >
      Ask a human to pick between candidate routings / classifications
      when a deterministic classifier returns is_ambiguous=true.
    snippet:
      inputs:
        candidates: { type: array,  required: true }
        prompt:     { type: string, default: "Pick one" }
      outputs:
        chosen:    { type: object }
        rationale: { type: string }
    initialState: awaiting_human
    states:
      awaiting_human:
        goal: Block; surface candidates + prompt to the operator.
        transitions:
          pick:
            target: done
            actor: human
            presents: ["$.context.candidates"]
            choices:
              field: chosen_id
              from: "$.context.candidates"
              value: "id"
              title: "name"
            inputSchema:
              type: object
              required: [chosen_id]
              properties:
                chosen_id: { type: string }
                rationale: { type: string, default: "" }
            executor: { kind: human }
            output:
              chosen:
                pick:
                  from: "$.context.candidates"
                  by: "id"
                  eq: "$.arguments.chosen_id"
              rationale: "$.arguments.rationale"
      done: { terminal: true }
