version: "1.0.0"
workflows:
  orch:
    initialState: start
    version: "1.0.0"
    blackboard:
      sev: { type: string }
    states:
      start:
        transitions:
          classify:
            target: gate
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap_sev
              use:
                outputs:
                  "$.context.sev": severity
      gate:
        transitions:
          proceed:
            target: done
            actor: agent
            executor: { kind: noop }
            guards:
              - kind: expr
                expr: "$.context.sev == \"S1\""
      done:
        terminal: true
        transitions: {}
  cap_sev:
    initialState: only
    version: "1.0.0"
    snippet:
      outputs:
        severity: { type: string, enum: [S1, S2] }
    states:
      # This state used to be `terminal: true` with no transitions — a cap that
      # DECLARED `severity` and had no way on earth to write it. The fuzz never
      # noticed because it mocks `kind: workflow`, so the cap never actually ran;
      # V24 (UNWRITTEN_DECLARED_OUTPUT) caught it the moment it existed. Give the
      # cap a real transition that discharges its own contract.
      only:
        transitions:
          classify:
            target: done
            actor: deterministic
            executor: { kind: noop }
            output:
              severity: "$.output.severity"
      done:
        terminal: true
        transitions: {}
